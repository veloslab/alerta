name: CI

# Runs the three test tiers described in tests/README.md.
# - unit: every push and PR; fast; no docker.
# - smoke: every push and PR; docker build + image introspection.
# - integration: every PR and push to main; docker compose stack.
#
# The docker-image.yml workflow (release publish) runs separately on
# version tags. Tag a release only after CI has gone green on main.

on:
  push:
    branches: [main]
  pull_request:

# Cancel redundant runs when a branch receives multiple pushes in
# quick succession — only the latest commit's CI is worth running.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev deps + editable src/ packages
        # Mirrors the venv bootstrap in CLAUDE.md — keep in sync.
        # psycopg2 from requirements.txt is skipped here: unit tests
        # never touch the DB, and compiling it needs libpq-dev which
        # isn't worth the runner time.
        run: |
          python -m pip install --upgrade pip 'setuptools<81'
          pip install -r requirements-dev.txt
          pip install alerta-server==9.0.3 strenum
          pip install -e src/plugins/slackthread \
                      -e src/plugins/override \
                      -e src/webhooks/vls_grafana \
                      -e src/webhooks/prefectflows

      - name: Run unit tests
        run: pytest -m unit --tb=short

  smoke:
    name: Container smoke tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install test runner only
        # Smoke tests shell out to `docker` and don't import src/
        # modules, so we don't install the editable packages here.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke tests
        # tests/smoke/conftest.py runs `docker build` itself; ubuntu-latest
        # ships docker, so no setup-buildx or similar action is needed.
        # Scope to tests/smoke/ explicitly — pytest imports every conftest
        # and test module under the collected path at startup, and the
        # unit test files `from slackthread import ...` at module level,
        # which would fail here since this job doesn't install them.
        run: pytest tests/smoke -m smoke --tb=short

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: smoke
    # Skip on feature-branch pushes (where the same commits will
    # already have been checked via the pull_request event) to save
    # runner time. Still runs on PRs and on pushes to main.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        # Compose stack comes up from within the test fixtures
        # (tests/integration/conftest.py). Scoped to tests/integration/
        # for the same reason as the smoke job — this runner doesn't
        # install the editable src/ packages.
        # ALERTA_TESTS_KEEP_STACK=1: skip the fixture's session-teardown
        # so the next step's `docker compose logs` actually has a stack
        # to read from. The runner is ephemeral, so leaving containers
        # running on failure is fine.
        env:
          ALERTA_TESTS_KEEP_STACK: '1'
        run: pytest tests/integration -m integration --tb=short

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/integration/docker-compose.test.yml \
            logs --tail=500 || true
