[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast in-process tests, no docker required
    smoke: builds the alerta image and runs a single container health check
    integration: brings up the full docker-compose.test.yml stack (alerta + postgres + slack_mock)
addopts =
    -ra
    --strict-markers
    --tb=short
