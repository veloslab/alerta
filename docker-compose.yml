services:
  web:
    build: .
    ports:
      - 8080:8080
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/monitoring
      - AUTH_REQUIRED=True
      - ADMIN_USERS=admin@alerta.io,devops@alerta.io
      - ADMIN_PASSWORD=super-secret
      - ADMIN_KEY=demo-key
      - ADMIN_KEY_MAXAGE=500
      - PLUGINS=remote_ip,reject,heartbeat,blackout,normalise,enhance,slackthread
    restart: always

  db:
    # Pinned: postgres:latest now tracks 18, which changed its data
    # directory layout and refuses to reuse volumes from older majors.
    # Alerta 9.x is tested against 13-16; pin to the latest of that
    # range. If your production pg-data was initialized by a newer
    # major, bump this tag to match that version instead.
    image: postgres:16
    volumes:
      - ./pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: always